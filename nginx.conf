# 选课系统 nginx 边缘配置(dev:listen 8080 免 root;prod 改 443 ssl)
# 作用:限流(等候室)/ 静态卸载 / TLS 终止 / 把 6 个热端点路由到 Rust,其余到 Python。
# 用法:nginx -c /Users/gabiri/projects/选课/nginx.conf   (校验:nginx -t -c ...)
worker_processes auto;
error_log /tmp/club_nginx_error.log warn;
pid /tmp/club_nginx.pid;

events { worker_connections 4096; }

http {
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /tmp/club_nginx_access.log;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # 边缘限流:挡单客户端的狂点/重试。注意:校园多为单一公网出口(整校共用一个 IP),
    # 按 IP 限流会误伤所有学生 —— 故取较宽的 30r/s + 突发 60。真正的"不超卖"保证在应用层
    # 的 Redis 原子抢占,不靠边缘限流。单出口校园若仍被误伤,请调高 rate 或对校园出口
    # IP 段做白名单(geo/map 标记可信网段后跳过 limit_req)。
    limit_req_zone  $binary_remote_addr zone=grab:10m rate=30r/s;
    limit_req_status 503;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    # 热路径:首选 Rust(:2002),Rust 不可用自动回落 Python(:2001)backup —— 路由级秒级回滚
    upstream club_hot {
        server 127.0.0.1:2002 max_fails=2 fail_timeout=5s;
        server 127.0.0.1:2001 backup;
        keepalive 64;
    }
    upstream club_admin { server 127.0.0.1:2001; keepalive 32; }

    server {
        listen 8080;
        server_name _;
        root /Users/gabiri/projects/选课;
        limit_conn perip 50;

        # 静态页/资源:nginx 直发(从应用卸载,开放瞬间不打 Python/Rust)
        location = /                  { try_files /login.html =404; }
        location = /student/dashboard { try_files /student_dashboard.html =404; }
        location = /student/profile   { try_files /student_profile.html =404; }
        location = /admin/dashboard   { try_files /admin_dashboard.html =404; }
        location ~* \.(html|css|js|png|jpe?g|gif|svg|ico|woff2?|mp4)$ { try_files $uri =404; }

        # 热路径 -> Rust(:2002),limit_req 当等候室
        location ~ ^/api/(login|register_club|cancel_registration|get_clubs|check_registration_time|get_student_info)$ {
            limit_req zone=grab burst=60 nodelay;
            proxy_pass http://club_hot;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 其余 API(管理面)与未匹配路径 -> Python(:2001)
        location / {
            proxy_pass http://club_admin;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # 生产 TLS(取消注释并配置证书):
    # server {
    #     listen 443 ssl http2;
    #     ssl_certificate     /path/fullchain.pem;
    #     ssl_certificate_key /path/privkey.pem;
    #     ... 同上 location ...
    # }
}
